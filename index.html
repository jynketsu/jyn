<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jyn</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f14">
  <style>
    body{margin:0;font-family:system-ui,Arial;background:#0b0f14;color:#fff}
    header{padding:16px;background:#111827;display:flex;align-items:center;gap:10px}
    .logo{width:36px;height:36px;border-radius:8px;background:#ef4444;display:flex;align-items:center;justify-content:center;font-weight:700}
    main{padding:16px}
    button{padding:10px 14px;border:0;border-radius:10px;background:#ef4444;color:#fff}
  </style>
</head>
<body>
  <header>
    <div class="logo">J</div>
    <h2 style="margin:0">jyn</h2>
  </header>
  <main>
    <p>Ton app fitness (repas, séances, streak).</p>
    <button onclick="notif()">Test notification</button>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }

    function notif(){
      if (!('Notification' in window)) return alert('Notifications non supportées');
      Notification.requestPermission().then(p=>{
        if(p==='granted'){
          new Notification('jyn', {body:'Hydrate-toi 💧'});
        }
      });
    }
  </script>
</body>
</html>
