<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #111;
    color: #eee;
    font-family: monospace;
  }
  canvas {
    background: #000;
    border: 2px solid #444;
  }
  #info { margin: 10px; font-size: 18px; }
</style>
</head>
<body>
  <div id="info">Score : <span id="score">0</span> — Flèches pour jouer, Espace pour recommencer</div>
  <canvas id="game" width="400" height="400"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

const SIZE = 20;
const COLS = canvas.width / SIZE;
const ROWS = canvas.height / SIZE;
const SPEED = 100;

let snake, dir, nextDir, food, score, alive, timer;

function reset() {
  snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
  dir = {x: 1, y: 0};
  nextDir = dir;
  score = 0;
  alive = true;
  placeFood();
  scoreEl.textContent = score;
  if (timer) clearInterval(timer);
  timer = setInterval(tick, SPEED);
}

function placeFood() {
  while (true) {
    food = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS),
    };
    if (!snake.some(s => s.x === food.x && s.y === food.y)) return;
  }
}

function tick() {
  if (!alive) return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    alive = false;
    draw();
    return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#e33';
  ctx.fillRect(food.x * SIZE, food.y * SIZE, SIZE, SIZE);

  ctx.fillStyle = '#4c4';
  for (const s of snake) {
    ctx.fillRect(s.x * SIZE, s.y * SIZE, SIZE - 1, SIZE - 1);
  }

  if (!alive) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2);
    ctx.font = '16px monospace';
    ctx.fillText('Espace pour rejouer', canvas.width / 2, canvas.height / 2 + 30);
  }
}

document.addEventListener('keydown', (e) => {
  const map = {
    ArrowUp:    {x: 0, y: -1},
    ArrowDown:  {x: 0, y: 1},
    ArrowLeft:  {x: -1, y: 0},
    ArrowRight: {x: 1, y: 0},
  };
  if (e.key === ' ' && !alive) { reset(); return; }
  const d = map[e.key];
  if (!d) return;
  if (d.x === -dir.x && d.y === -dir.y) return;
  nextDir = d;
  e.preventDefault();
});

reset();
</script>
</body>
</html>
